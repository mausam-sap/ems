{% extends 'base.html' %}
{% block title %}Delete Department{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card p-4 border-danger">
    <h5 class="text-danger">Delete Department</h5>
    <p>Delete <strong>{{ dept.name }}</strong>?</p>
    <form method="post">{% csrf_token %}
      <button class="btn btn-danger">Delete</button>
      <a href="{% url 'employees:departments' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
  </div>
</div></div>
{% endblock %}
